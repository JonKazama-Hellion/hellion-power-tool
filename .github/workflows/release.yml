name: Create Signed Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (z.B. v8.0.0.0)'
        required: true
        default: 'v8.0.0.0'

permissions:
  contents: write

jobs:
  create-signed-release:
    name: Create Signed Release
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Determine version and codename
      id: version
      shell: powershell
      run: |
        if ("${{ github.event_name }}" -eq "push") {
          $version = "${{ github.ref_name }}"
        } else {
          $version = "${{ github.event.inputs.version }}"
        }

        # Codename dynamisch aus config/version.txt lesen
        $codename = "Release"
        if (Test-Path "config/version.txt") {
          $lines = Get-Content "config/version.txt" -EA SilentlyContinue
          if ($lines -and $lines.Count -ge 2) { $codename = $lines[1].Trim() }
        }

        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "codename=$codename" >> $env:GITHUB_OUTPUT
        Write-Host "Version: $version | Codename: $codename"

    - name: Create self-signed certificate
      shell: powershell
      run: |
        Write-Host "[INFO] Erstelle Self-Signed Zertifikat..."

        $cert = New-SelfSignedCertificate `
          -Subject "CN=Hellion Power Tool" `
          -Type CodeSigning `
          -KeyUsage DigitalSignature `
          -FriendlyName "Hellion Power Tool Code Signing Certificate" `
          -NotAfter (Get-Date).AddYears(3) `
          -CertStoreLocation "Cert:\CurrentUser\My"

        Export-Certificate -Cert $cert -FilePath "hellion-certificate.cer"
        echo "CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV

    - name: Sign PowerShell files
      shell: powershell
      run: |
        Write-Host "[INFO] Signiere PowerShell-Dateien..."

        $cert = Get-ChildItem "Cert:\CurrentUser\My\$($env:CERT_THUMBPRINT)"
        $signedCount = 0

        Get-ChildItem *.ps1 -Recurse | ForEach-Object {
          try {
            $result = Set-AuthenticodeSignature -FilePath $_.FullName -Certificate $cert
            if ($result.Status -eq "Valid") {
              Write-Host "[OK] $($_.Name)"
              $signedCount++
            } else {
              Write-Warning "[FEHLER] $($_.Name) - Status: $($result.Status)"
            }
          } catch {
            Write-Warning "[FEHLER] $($_.Name): $($_.Exception.Message)"
          }
        }

        Write-Host "[ERGEBNIS] $signedCount PowerShell-Dateien signiert"

    - name: Create release package
      shell: powershell
      run: |
        Write-Host "[INFO] Erstelle Release-Paket..."

        $version = "${{ steps.version.outputs.version }}"
        $packageName = "hellion-power-tool-$version.zip"

        # Dateien und Ordner die nicht ins Release gehoeren
        $excludePatterns = @(
          ".git*",
          ".claude*",
          "temp\*",
          "logs\*",
          "backups\*",
          "dev\*",
          "tests\*",
          "*.tmp",
          "*.log",
          ".vs\*",
          "node_modules\*",
          "CLAUDE.md"
        )

        $allFiles = Get-ChildItem -Recurse -File
        $releaseFiles = $allFiles | Where-Object {
          $file = $_
          $include = $true
          foreach ($pattern in $excludePatterns) {
            if ($file.FullName -like "*$pattern*") {
              $include = $false
              break
            }
          }
          $include
        }

        New-Item -Path "hellion-release" -ItemType Directory -Force | Out-Null

        foreach ($file in $releaseFiles) {
          $relativePath = $file.FullName.Substring((Get-Location).Path.Length + 1)
          $destPath = Join-Path "hellion-release" $relativePath
          $destDir = Split-Path $destPath -Parent
          if (-not (Test-Path $destDir)) {
            New-Item -Path $destDir -ItemType Directory -Force | Out-Null
          }
          Copy-Item $file.FullName -Destination $destPath -Force
        }

        Compress-Archive -Path "hellion-release\*" -DestinationPath $packageName -Force
        Remove-Item "hellion-release" -Recurse -Force

        $packageSize = (Get-Item $packageName).Length / 1MB
        Write-Host "[OK] $packageName ($('{0:N2}' -f $packageSize) MB, $($releaseFiles.Count) Dateien)"

    - name: Generate checksums
      shell: powershell
      run: |
        $version = "${{ steps.version.outputs.version }}"
        $checksums = @()

        Get-ChildItem "hellion-power-tool-$version.zip", "*.cer" | ForEach-Object {
          $hash = Get-FileHash $_.Name -Algorithm SHA256
          $checksums += "$($hash.Hash.ToLower())  $($_.Name)"
          Write-Host "SHA256 ($($_.Name)): $($hash.Hash.ToLower())"
        }

        $checksums | Out-File "checksums.txt" -Encoding UTF8

    - name: Create release notes
      shell: powershell
      run: |
        $version = "${{ steps.version.outputs.version }}"
        $codename = "${{ steps.version.outputs.codename }}"

        $content = @"
        # Hellion Power Tool $version "$codename"

        > Entwickelt von [Hellion Online Media](https://hellion-media.de) — Open Source, nicht-kommerziell.

        ---

        ## Windows Defender Hinweis

        Dieses Tool kann eine False-Positive-Warnung ausloesen (**Trojan:Script/Wacatac.B!ml**).
        Das ist **kein Virus** — administrative PowerShell-Operationen triggern heuristische Erkennung.

        **Loesung:** Tool-Ordner als Defender-Ausnahme hinzufuegen.
        Details: [DEFENDER-WHITELIST.md](https://github.com/${{ github.repository }}/blob/main/docs/DEFENDER-WHITELIST.md)

        ---

        ## Download und Installation

        1. **``hellion-power-tool-$version.zip``** herunterladen und entpacken
        2. Hellion-Ordner zur Defender-Ausnahme hinzufuegen
        3. **``START.bat``** doppelklicken (startet die GUI)
        4. PowerShell 7 wird bei Bedarf automatisch zur Installation angeboten

        | Datei | Beschreibung |
        |-------|-------------|
        | ``hellion-power-tool-$version.zip`` | Vollstaendiges Release (signiert) |
        | ``hellion-certificate.cer`` | Zertifikat zur Signatur-Verifikation |
        | ``checksums.txt`` | SHA256-Hashes zur Integritaetspruefung |

        ---

        ## Aenderungen

        ### GUI
        - Vollstaendige WPF-Oberflaeche mit Dark und Light Mode
        - Sidebar-Navigation, Modul-Karten, Live-Log-Panel
        - Software-Installer mit 76 Winget-Paketen in 11 Kategorien
        - System-Info-Seite mit Hardware-Uebersicht und Export
        - Prerequisite-Check beim Start (.NET, PowerShell, winget, git)
        - Loading-States fuer System- und Software-Seite

        ### Performance
        - Page-Caching mit Visibility-Toggle (kein Rebuild pro Seitenwechsel)
        - Async CIM-Queries in Runspaces (UI bleibt responsiv)
        - Brush-Cache und Frozen Brushes fuer WPF-Rendering
        - BitmapCache fuer Hardware-beschleunigte Karten

        ### Projektstruktur
        - Professionelle Verzeichnisstruktur (``src/``, ``config/``, ``build/``, ``tests/``)
        - ``START.bat`` im Root als GUI-Einstieg
        - CLI fuer Power-User unter ``src/launcher/start-cli.bat``

        ### Fixes
        - Fenster-Drag bei maximiertem Fenster funktioniert
        - Doppelklick auf Titelleiste zum Maximieren/Wiederherstellen
        - Auto-Updater sichert jetzt auch GUI-Einstellungen
        - 15 kritische und 9 Warning-Bugfixes aus Code-Audit

        ---

        ## Systemanforderungen

        | Komponente | Minimum | Empfohlen |
        |-----------|---------|-----------|
        | Betriebssystem | Windows 10 | Windows 11 |
        | PowerShell | 5.1 (vorinstalliert) | 7.x |
        | .NET Framework | 4.8 (vorinstalliert ab Win10) | — |
        | Berechtigungen | Administrator | Administrator |
        | Optional | — | winget, git |

        ---

        ## Sicherheit

        - Quellcode vollstaendig auf GitHub einsehbar
        - Alle PowerShell-Dateien digital signiert (Self-Signed)
        - SHA256-Checksums in ``checksums.txt``
        - Keine Datenexfiltration, kein Telemetrie, keine versteckten Funktionen

        ---

        *Hellion Power Tool — [Hellion Online Media](https://hellion-media.de) — [GitHub](https://github.com/${{ github.repository }})*
        "@

        # Einrueckung entfernen (PowerShell Here-String Formatierung)
        $content = ($content -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"
        $content | Out-File "release-notes.md" -Encoding UTF8

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: Hellion Power Tool ${{ steps.version.outputs.version }} "${{ steps.version.outputs.codename }}"
        body_path: release-notes.md
        draft: false
        prerelease: false
        files: |
          hellion-power-tool-${{ steps.version.outputs.version }}.zip
          hellion-certificate.cer
          checksums.txt
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Release summary
      if: always()
      shell: powershell
      run: |
        Write-Host ""
        Write-Host "========================================="
        Write-Host "  Release Summary"
        Write-Host "========================================="
        Write-Host "  Version:  ${{ steps.version.outputs.version }}"
        Write-Host "  Codename: ${{ steps.version.outputs.codename }}"
        Write-Host "  Signiert: Ja (Self-Signed)"
        Write-Host "  Checksums: SHA256"
        Write-Host "========================================="
